# Pormpuraaw — scene extent for scoring (southern classification region).
# bbox matches the score_bbox from pormpuraaw.yaml.
# Training labels come from pormpuraaw.yaml sub_bboxes via label_pixels().
name: "Pormpuraaw Scene"
centroid: [-14.675, 141.592]  # [lat, lon] — approximate centre of score extent
bbox: [141.556800, -14.689236, 141.626740, -14.660263]  # [lon_min, lat_min, lon_max, lat_max]
dry_months: [5, 6, 7, 8, 9, 10]
notes: >
  Scene extent for Pormpuraaw classification pipeline. Southern sub-region of
  the full Pormpuraaw fetch bbox, used for scoring. Pixel data lives at
  data/pixels/pormpuraaw-scene/pormpuraaw-scene.parquet. Training labels are
  drawn from data/locations/pormpuraaw.yaml sub_bboxes. Parent of
  data/locations/pormpuraaw.yaml.

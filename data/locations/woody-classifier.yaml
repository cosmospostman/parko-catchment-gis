# Training and validation regions for the woody-classifier stage-1 mask.
# See docs/WOODY-CLASSIFIER.md for design rationale and bbox sizing guidelines.
#
# Schema (identical to training.yaml)
# ------------------------------------
# id     : str        — unique slug
# name   : str        — human-readable description
# label  : str        — "presence" (woody) | "absence" (non-woody)
# bbox   : [lon_min, lat_min, lon_max, lat_max]  (EPSG:4326)
# year   : int | null — optional; restrict to observations in [year-5, year]
# tags   : list[str]  — optional; climate zone, vegetation type, val/train split
# notes  : str        — optional


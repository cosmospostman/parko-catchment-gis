# data/locations/training.yaml
#
# National training regions for TAM (Temporal Attention Model).
# Each region defines a labeled bbox used to source training pixels.
#
# Schema
# ------
# id          : str        — unique slug, used for region selection and index lookup
# name        : str        — human-readable description
# label       : str        — "presence" | "absence"
# bbox        : [lon_min, lat_min, lon_max, lat_max]  (EPSG:4326)
# years       : list[int]    — calendar years to fetch and train on (e.g. [2020, 2021, 2022, 2023, 2024, 2025])
#                              fetch window is [min(years), max(years)] — no implicit -5 subtraction
# tags        : list[str]  — optional; for documentation/filtering reference
# notes       : str        — optional; field survey context, data quality notes
#
# Pixel data is fetched per S2 tile (transparent to this file).
# The pixel collector resolves each bbox → intersecting tile IDs and writes
# to data/training/tiles/{tile_id}.parquet, with a sidecar index at
# data/training/index.parquet mapping region_id → tile_ids.
#
# Experiment scripts select regions by listing their IDs:
#   regions: [lake_mueller_presence, lake_mueller_absence, barcoorah_presence, frenchs_presence_1]

regions:


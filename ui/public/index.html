<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌿 Parko GIS</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
  <style>
    :root {
      --primary-dark:   #1e0a3c;
      --primary-mid:    #2e1065;
      --primary-border: #4c1d95;
      --primary-accent: #7c3aed;
      --primary-light:  #ede9fe;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e0e0e0;
    }

    #sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #242424;
      border-right: 1px solid #333;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 10px 14px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #sidebar-header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f0f0f0;
      flex-shrink: 0;
    }


    /* ---- Locations panel ---- */

    /* ---- Training regions accordion ---- */

    #training-accordion {
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #training-accordion-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      color: #aaa;
    }

    #training-accordion-header:hover { background: #2e2e2e; }

    #training-accordion-header input[type="checkbox"] {
      accent-color: var(--primary-accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    #training-accordion-header .accordion-label {
      flex: 1;
      font-weight: 500;
      color: #c0c0c0;
    }

    #training-accordion-header .accordion-chevron,
    #sightings-accordion-header .accordion-chevron {
      font-size: 10px;
      color: #555;
      transition: transform 0.15s;
    }

    #training-accordion-header.open .accordion-chevron,
    #sightings-accordion-header.open .accordion-chevron {
      transform: rotate(90deg);
    }

    #training-accordion-body {
      display: none;
      flex-direction: column;
      background: #1e1e1e;
      max-height: 220px;
      overflow-y: auto;
    }

    #training-accordion-body.open { display: flex; }

    .training-region-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px 7px 30px;
      cursor: pointer;
      border-top: 1px solid #2a2a2a;
      font-size: 12px;
      color: #b0b0b0;
      transition: background 0.1s;
    }

    .training-region-item:hover { background: #262626; }

    .training-role-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .training-role-dot.presence { background: #22c55e; }
    .training-role-dot.absence  { background: #ef4444; }

    /* ---- Catchments accordion ---- */

    #catchments-accordion {
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #catchments-accordion-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      color: #aaa;
    }

    #catchments-accordion-header:hover { background: #2e2e2e; }

    #catchments-accordion-header input[type="checkbox"] {
      accent-color: #38bdf8;
      cursor: pointer;
      flex-shrink: 0;
    }

    #catchments-accordion-header .accordion-label {
      flex: 1;
      font-weight: 500;
      color: #c0c0c0;
    }

    #catchments-accordion-header .accordion-chevron {
      font-size: 10px;
      color: #555;
      transition: transform 0.15s;
    }

    #catchments-accordion-header.open .accordion-chevron { transform: rotate(90deg); }

    #catchments-accordion-body {
      display: none;
      flex-direction: column;
      background: #1e1e1e;
      max-height: 180px;
      overflow-y: auto;
    }

    #catchments-accordion-body.open { display: flex; }

    .catchment-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px 7px 30px;
      cursor: pointer;
      border-top: 1px solid #2a2a2a;
      font-size: 12px;
      color: #b0b0b0;
      transition: background 0.1s;
    }

    .catchment-item:hover { background: #262626; }

    .catchment-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #38bdf8;
    }

    #panel-locations {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    #location-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    #location-list li {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid #2d2d2d;
      line-height: 1.4;
      transition: background 0.1s;
    }

    #location-list li:hover { background: #2e2e2e; }
    #location-list li.active { background: var(--primary-dark); }

    #location-list li .loc-name {
      font-weight: 500;
      color: #d0d0d0;
    }

    #location-list li .loc-id {
      font-size: 11px;
      color: #666;
      margin-top: 1px;
    }

    .loc-ranking-select {
      width: 100%;
      margin-top: 5px;
      background: #1a1a1a;
      color: #d0d0d0;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      padding: 2px 4px;
      font-size: 11px;
      cursor: pointer;
    }

    /* ---- BBox accordion ---- */

    #bbox-accordion {
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #bbox-accordion-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
    }

    #bbox-accordion-header:hover { background: #2e2e2e; }

    #bbox-accordion-header .accordion-label {
      flex: 1;
      font-weight: 500;
      color: #c0c0c0;
    }

    #bbox-accordion-header .accordion-chevron {
      font-size: 10px;
      color: #555;
      transition: transform 0.15s;
    }

    #bbox-accordion-header.open .accordion-chevron { transform: rotate(90deg); }
    #bbox-accordion-header.open { background: var(--primary-dark); }
    #bbox-accordion-header.open .accordion-label { color: var(--primary-accent); }

    #bbox-accordion-body {
      display: none;
      background: #1e1e1e;
    }

    #bbox-accordion-body.open { display: block; }

    #panel-bbox {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #panel-bbox .hint {
      color: #888;
      line-height: 1.5;
      font-size: 12px;
    }

    #bbox-coords {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 6px;
    }

    #bbox-coords .coord-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #bbox-coords .coord-value {
      font-family: monospace;
      font-size: 12px;
      color: #c0c0c0;
      word-break: break-all;
    }

    #bbox-coords .yaml-snippet {
      margin-top: 4px;
      background: #111;
      border-radius: 3px;
      padding: 7px 8px;
      font-family: monospace;
      font-size: 11px;
      color: #e0e0e0;
      white-space: pre;
      overflow-x: auto;
    }

    #btn-copy {
      background: var(--primary-dark);
      color: var(--primary-accent);
      border: 1px solid var(--primary-border);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
    }
    #btn-copy:hover { background: var(--primary-mid); }
    #btn-copy.copied { background: #14532d; color: #86efac; border-color: #1a6b35; }

    #btn-clear {
      background: none;
      color: #666;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
    }
    #btn-clear:hover { background: #2e2e2e; color: #aaa; }

    /* ---- Imagery info section (bottom of sidebar) ---- */

    #ranking-section {
      border-top: 1px solid #333;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    #sightings-accordion {
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    #sightings-accordion-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      color: #aaa;
    }

    #sightings-accordion-header:hover { background: #2e2e2e; }

    #sightings-accordion-header .accordion-label {
      flex: 1;
      font-weight: 500;
      color: #c0c0c0;
    }

    #sightings-accordion-body {
      display: none;
      background: #1e1e1e;
    }

    #sightings-accordion-body.open { display: block; }

    .sightings-body-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 10px 30px;
      font-size: 12px;
      color: #b0b0b0;
    }

    .sightings-body-inner .ikey {
      font-size: 11px;
      color: #555;
      min-width: 36px;
      flex-shrink: 0;
    }

    #imagery-info {
      border-top: 1px solid #333;
      padding: 12px 16px;
      flex-shrink: 0;
      min-height: 0;
    }

    #imagery-info .section-label,
    #ranking-section .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 6px;
    }

    #imagery-info .irow,
    #ranking-section .irow {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      align-items: baseline;
    }

    #imagery-info .ikey,
    #ranking-section .ikey {
      font-size: 11px;
      color: #555;
      min-width: 44px;
      flex-shrink: 0;
    }

    #layer-select,
    #ranking-select,
    #colormap-select {
      flex: 1;
      background: #1a1a1a;
      color: #d0d0d0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 4px;
      font-size: 11px;
      cursor: pointer;
      min-width: 0;
    }

    #imagery-info .ival {
      font-size: 12px;
      color: #b0b0b0;
      line-height: 1.3;
      word-break: break-word;
    }

    #imagery-info .ival.mono {
      font-family: monospace;
      font-size: 11px;
    }

    #imagery-info .ival.dim { color: #444; font-style: italic; }

    /* ---- Map ---- */

    #map { flex: 1; }

    /* ---- Popups ---- */

    .maplibregl-popup-content {
      background: #242424;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 12px;
      max-width: 280px;
    }

    .maplibregl-popup-tip { border-top-color: #444; }

    .maplibregl-popup-close-button {
      color: #aaa;
      font-size: 16px;
      padding: 2px 6px;
    }
    .maplibregl-popup-close-button:hover { color: #fff; }

    .popup-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: #f0f0f0;
    }

    .popup-row {
      display: flex;
      gap: 6px;
      margin-bottom: 3px;
    }

    .popup-label { color: #888; min-width: 52px; }

    .popup-notes {
      margin-top: 6px;
      color: #aaa;
      font-style: italic;
      line-height: 1.4;
    }

    .role-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .role-presence { background: #14532d; color: #86efac; }
    .role-absence  { background: #7f1d1d; color: #fca5a5; }
    .role-survey   { background: #713f12; color: #fde68a; }
    .role-location { background: var(--primary-dark); color: var(--primary-accent); }
    .role-score-bbox { background: #3b0764; color: #d8b4fe; }

    #colormap-swatch {
      display: inline-block;
      width: 52px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
      align-self: center;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>🌿 Parko GIS</h1>
    </div>

    <!-- Locations panel -->
    <div id="panel-locations">
      <div id="bbox-accordion">
        <div id="bbox-accordion-header">
          <span class="accordion-label">BBox tool</span>
          <span class="accordion-chevron">&#9658;</span>
        </div>
        <div id="bbox-accordion-body">
          <div id="panel-bbox">
            <p class="hint">Click and drag on the map to draw a bounding box.</p>
            <div id="bbox-coords">
              <div class="yaml-snippet" id="bbox-yaml"></div>
              <div style="display:flex;gap:6px;">
                <button id="btn-copy">Copy</button>
                <button id="btn-clear">Close</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="training-accordion">
        <div id="training-accordion-header">
          <input type="checkbox" id="training-toggle" checked>
          <span class="accordion-label">Training regions</span>
          <span class="accordion-chevron">&#9658;</span>
        </div>
        <div id="training-accordion-body"></div>
      </div>
      <div id="catchments-accordion">
        <div id="catchments-accordion-header">
          <input type="checkbox" id="catchments-toggle" checked>
          <span class="accordion-label">Catchments</span>
          <span class="accordion-chevron">&#9658;</span>
        </div>
        <div id="catchments-accordion-body"></div>
      </div>
      <div id="sightings-accordion">
        <div id="sightings-accordion-header">
          <input type="checkbox" id="sightings-toggle" style="accent-color:#f97316;" checked>
          <span class="accordion-label">ALA sightings (<span id="sightings-count">—</span>)</span>
          <span class="accordion-chevron">&#9658;</span>
        </div>
        <div id="sightings-accordion-body">
          <div class="sightings-body-inner">
            <span class="ikey">since</span>
            <div style="flex:1;">
              <input type="range" id="sightings-year-slider" min="1900" max="2026" value="1900" step="1" style="width:100%;accent-color:#f97316;">
              <span id="sightings-year-label" style="font-size:11px;color:#888;">all years</span>
            </div>
          </div>
        </div>
      </div>
      <ul id="location-list"></ul>
    </div>

    <!-- Rankings overlay -->
    <div id="ranking-section">
      <div class="section-label">Active ranking</div>
      <div class="irow">
        <span class="ikey">opacity</span>
        <input type="range" id="ranking-opacity" min="0" max="100" value="60"
               style="flex:1; accent-color:var(--primary-accent);" />
      </div>
      <div class="irow">
        <span class="ikey">cutoff</span>
        <input type="range" id="ranking-cutoff" min="0" max="100" value="0"
               style="flex:1; accent-color:var(--primary-accent);" />
        <span id="ranking-cutoff-label" style="min-width:32px;text-align:right;font-size:11px;">0%</span>
      </div>
      <div class="irow">
        <span class="ikey">color</span>
        <select id="colormap-select">
          <option value="rdylgn">RdYlGn</option>
          <option value="plasma">Plasma</option>
          <option value="viridis">Viridis</option>
        </select>
        <span id="colormap-swatch"></span>
      </div>
    </div>


<!-- Imagery info — always visible at bottom -->
    <div id="imagery-info">
      <div class="section-label">Imagery</div>
      <div class="irow">
        <span class="ikey">layer</span>
        <select id="layer-select">
          <option value="LatestStateProgram_QGovSISPUsers">Latest aerial (QGlobe)</option>
          <option value="LatestStateProgram_AllUsers">Latest aerial (public)</option>
          <option value="LatestSatelliteWOS_AllUsers">Latest satellite (Planet)</option>
          <option value="EsriWorldImagery">Recent satellite (Esri)</option>
        </select>
      </div>
      <div class="irow">
        <span class="ikey">captured</span>
        <span class="ival" id="ii-date"><span class="dim">loading…</span></span>
      </div>
      <div class="irow">
        <span class="ikey">dataset</span>
        <span class="ival mono" id="ii-name"><span class="dim">—</span></span>
      </div>
    </div>
  </div>

  <div id="map"></div>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

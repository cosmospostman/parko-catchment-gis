# training/locations/training_regions.yaml
#
# National training regions for TAM (Temporal Attention Model).
# Each region defines a labeled bbox used to source training pixels.
#
# Schema
# ------
# id          : str   — unique slug, used for region selection and index lookup
# name        : str   — human-readable description
# label       : str   — "presence" | "absence"
# bbox        : [lon_min, lat_min, lon_max, lat_max]  (EPSG:4326)
# tags        : list[str]  — optional; for documentation/filtering reference
# notes       : str   — optional; field survey context, data quality notes
#
# Pixel data is fetched per S2 tile (transparent to this file).
# The pixel collector resolves each bbox → intersecting tile IDs and writes
# to data/training/tiles/{tile_id}.parquet, with a sidecar index at
# data/training/index.parquet mapping region_id → tile_ids.
#
# Experiment scripts select regions by listing their IDs:
#   regions: [longreach_presence, longreach_absence, frenchs_presence]

regions:

  # ---------------------------------------------------------------------------
  # Longreach — Thomson River riparian corridor (GPS-logged field survey)
  # ---------------------------------------------------------------------------
  - id: longreach_presence
    name: "Longreach — Thomson River infestation core"
    label: presence
    bbox: [145.4239, -22.7640, 145.4250, -22.7610]
    tags: [arid, riparian, gps_surveyed]
    notes: >
      Primary presence site. GPS-logged field survey. Dense Parkinsonia infestation
      along the Thomson River. ~363 pixels at 10 m resolution.

  - id: longreach_absence
    name: "Longreach — riparian corridor south of infestation"
    label: absence
    bbox: [145.4239, -22.7672, 145.4250, -22.7640]
    tags: [arid, riparian, gps_surveyed]
    notes: >
      Primary absence site. Same riparian corridor immediately south of infestation.
      Confirmed absence by field survey. ~385 pixels at 10 m resolution.

  # ---------------------------------------------------------------------------
  # Frenchs — additional site (add notes once surveyed)
  # ---------------------------------------------------------------------------
  - id: frenchs_presence
    name: "Frenchs — presence core"
    label: presence
    bbox: [145.38, -22.85, 145.42, -22.81]
    tags: [arid, riparian]
    notes: >
      Placeholder — update bbox and notes once field survey is complete.
